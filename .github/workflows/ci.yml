name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  mobile:
    name: mobile (flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Bumped from 3.24.3: pubspec's SDK constraint is now ^3.9.0 (see
          # pubspec.yaml comment) to support the OpenAPI-generated client's
          # json_serializable output syntax. Flutter 3.35.0+ bundles Dart 3.9+.
          flutter-version: 3.44.5
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
        continue-on-error: true
      - name: Test
        run: flutter test
      - name: Build
        run: flutter build web --release

  api-contract-drift:
    name: api contract drift (openapi codegen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.5
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Regenerate typed client from vendored schema
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Fail if the committed generated client is stale
        run: |
          git diff --exit-code -- lib/api/generated || {
            echo "::error::lib/api/generated is out of sync with openapi/schema.yaml." \
                 "Re-copy the backend's api/schema.yaml into openapi/schema.yaml," \
                 "run 'dart run build_runner build --delete-conflicting-outputs'," \
                 "and commit the result."
            exit 1
          }
