name: CI

on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    FLUTTER_CHANNEL: stable
    FLUTTER_VERSION_PIN: 3.44.5

jobs:
    lint:
        name: Lint (flutter analyze)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Flutter analyze
              run: flutter analyze

    test:
        name: Test (flutter test --coverage)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Flutter test with coverage
              run: flutter test --coverage
            - name: Upload coverage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-lcov
                  path: coverage/lcov.info
                  if-no-files-found: warn

    build:
        name: Build (web --release)
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - uses: actions/checkout@v4
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Build web (release)
              # Web is used here instead of the Windows desktop target to keep
              # CI fast and cross-platform; the full Windows desktop build +
              # installer pipeline is already covered by .github/workflows/release.yml
              # on tag pushes.
              run: flutter build web --release
