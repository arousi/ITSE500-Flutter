name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  mobile:
    name: mobile (flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Bumped from 3.24.3: pubspec's SDK constraint is now ^3.9.0 (see
          # pubspec.yaml comment) to support the OpenAPI-generated client's
          # json_serializable output syntax. Flutter 3.35.0+ bundles Dart 3.9+.
          flutter-version: 3.44.5
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
        continue-on-error: true
      - name: Test
        run: flutter test
      - name: Build
        run: flutter build web --release

  api-contract-drift:
    name: api contract drift (openapi codegen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.5
          cache: true
      - name: Pub get
        run: flutter pub get
      - name: Regenerate typed client from vendored schema
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Fail if the committed generated client is stale
        run: |
          git diff --exit-code -- lib/api/generated || {
            echo "::error::lib/api/generated is out of sync with openapi/schema.yaml." \
                 "Re-copy the backend's api/schema.yaml into openapi/schema.yaml," \
                 "run 'dart run build_runner build --delete-conflicting-outputs'," \
                 "and commit the result."
            exit 1
          }
on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

env:
    FLUTTER_CHANNEL: stable
    FLUTTER_VERSION_PIN: 3.44.5

jobs:
    lint:
        name: Lint (flutter analyze)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Flutter analyze
              run: flutter analyze

    test:
        name: Test (flutter test --coverage)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Flutter test with coverage
              run: flutter test --coverage
            - name: Upload coverage artifact
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-lcov
                  path: coverage/lcov.info
                  if-no-files-found: warn

    build:
        name: Build (web --release)
        runs-on: ubuntu-latest
        needs: [lint, test]
        steps:
            - uses: actions/checkout@v4
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Build web (release)
              # Web is used here instead of the Windows desktop target to keep
              # CI fast and cross-platform; the full Windows desktop build +
              # installer pipeline is already covered by .github/workflows/release.yml
              # on tag pushes.
              run: flutter build web --release
