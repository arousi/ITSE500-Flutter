name: Release Multi-Platform Builds

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    id-token: write

env:
    FLUTTER_CHANNEL: stable
    FLUTTER_VERSION_PIN: 3.24.3
    RELEASE_TAG: ${{ github.ref_name }}

jobs:
    android:
        name: Android (AAB + APK)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Java (Temurin 17)
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Optional Android signing setup
              env:
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
                  KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
              run: |
                  set -euo pipefail
                  if [ -n "${ANDROID_KEYSTORE_BASE64}" ]; then
                    echo "Setting up Android signing keystore";
                    echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
                    {
                      echo "storePassword=${KEYSTORE_PASSWORD}";
                      echo "keyPassword=${KEY_ALIAS_PASSWORD}";
                      echo "keyAlias=${KEY_ALIAS}";
                      echo "storeFile=release.keystore";
                    } > android/key.properties
                    echo "Created android/key.properties";
                  else
                    echo "No ANDROID_KEYSTORE_BASE64 secret found; building unsigned artifacts.";
                  fi
            - name: Build Android AppBundle
              run: flutter build appbundle --release
            - name: Build Android APK (universal)
              run: flutter build apk --release --target-platform=android-arm,android-arm64,android-x64
            - name: Collect Android artifacts
              run: |
                  mkdir -p dist/android
                  # Copy and rename AAB
                  found_aab=false
                  for f in build/app/outputs/bundle/release/*.aab; do
                    if [ -f "$f" ]; then
                      cp "$f" "dist/android/app-bundle-${{ env.RELEASE_TAG }}.aab"; found_aab=true; break; fi
                  done
                  if [ "$found_aab" = false ]; then echo 'No AAB found at expected path'; fi
                  # Copy and rename universal APK (may not exist if split per-abi)
                  if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
                    cp build/app/outputs/flutter-apk/app-release.apk dist/android/app-universal-${{ env.RELEASE_TAG }}.apk;
                  else
                    echo "No universal app-release.apk found (possibly split builds).";
                  fi
                  echo 'Android dist contents:'
                  ls -l dist/android || true
              shell: bash
            - name: Upload Android artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: android
                  path: dist/android/*

    web:
        name: Web
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
            - name: Build Web
              run: flutter build web --release
            - name: Package Web build (zip)
              run: |
                  cd build/web
                  zip -r ../../web-${{ env.RELEASE_TAG }}.zip .
            - name: Upload Web artifact
              uses: actions/upload-artifact@v4
              with:
                  name: web
                  path: web-${{ env.RELEASE_TAG }}.zip

    windows:
        name: Windows (MSIX + Zip)
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
            - name: Validate toolchain info (debug)
              shell: pwsh
              run: |
                  Write-Host "Git SHA: $env:GITHUB_SHA"
                  $cl = Get-Command cl.exe -ErrorAction SilentlyContinue
                  if ($cl) {
                    Write-Host "MSVC detected at: $($cl.Source)"
                    & cl.exe 2>&1 | Select-Object -First 1 | Write-Host
                  } else {
                    Write-Warning 'cl.exe not on PATH (expected before vcvars setup); build will still proceed via CMake/VS generator.'
                  }
                  $vswhere = "$Env:ProgramFiles(x86)\Microsoft Visual Studio\Installer\vswhere.exe"
                  if (Test-Path $vswhere) {
                    & $vswhere -latest -products * -format json | Out-Null
                  }
            - name: Debug list runner sources
              run: |
                  Write-Host 'Listing windows/runner contents:'
                  Get-ChildItem -Recurse windows/runner | ForEach-Object { Write-Host $_.FullName }
                  Write-Host 'Verifying key header files exist:'
                  if (!(Test-Path windows/runner/flutter_window.h)) { Write-Error 'flutter_window.h missing' }
                  if (!(Test-Path windows/runner/win32_window.h)) { Write-Error 'win32_window.h missing' }
                  if (!(Test-Path windows/runner/utils.h)) { Write-Error 'utils.h missing' }
              shell: pwsh
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: ${{ env.FLUTTER_CHANNEL }}
                  flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
                  cache: true
            - name: Flutter pub get
              run: flutter pub get
              shell: pwsh
            - name: Build Windows
              run: flutter build windows --release
              shell: pwsh
            - name: Validate Windows runtime bundle
              run: |
                  $runtimeDir = "build/windows/x64/runner/Release"
                  Write-Host "Runtime directory: $runtimeDir"
                  Get-ChildItem $runtimeDir | Select-Object Name,Length | Format-Table | Out-String | Write-Host
                  $required = @('flutter_windows.dll','data')
                  foreach ($r in $required) {
                    if (-not (Test-Path (Join-Path $runtimeDir $r))) { Write-Error "Missing required runtime component: $r" }
                  }
                  # Handle icudtl.dat which may live under data/ in some layouts; ensure it exists at root for older expectations.
                  $icuRoot = Join-Path $runtimeDir 'icudtl.dat'
                  if (-not (Test-Path $icuRoot)) {
                    $icuFound = Get-ChildItem $runtimeDir -Recurse -Filter icudtl.dat | Select-Object -First 1
                    if ($icuFound) {
                      Copy-Item $icuFound.FullName $icuRoot
                      Write-Host "Copied icudtl.dat from $($icuFound.FullName) to runtime root.";
                    } else {
                      Write-Error 'icudtl.dat not found anywhere in runtime directory tree.'
                    }
                  } else { Write-Host 'icudtl.dat present at runtime root.' }
                  # Check for any plugin dlls (at least one *_plugin.dll) – warn if none
                  $plugins = Get-ChildItem $runtimeDir -Filter '*_plugin.dll' | Select-Object -First 1
                  if (-not $plugins) { Write-Warning 'No *_plugin.dll files detected. If plugins are expected, verify Windows implementation.' }
              shell: pwsh
            - name: Package Windows zip
              run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-${{ env.RELEASE_TAG }}.zip
              shell: pwsh
            - name: (Optional) Build MSIX via script if cert present
              env:
                  WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
                  WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
              run: |
                  if ($env:WINDOWS_CERT_PFX) {
                    Write-Host "Building MSIX (certificate provided)";
                    $pfxBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX)
                    [IO.File]::WriteAllBytes('windows_signing_cert.pfx', $pfxBytes)
                    powershell -ExecutionPolicy Bypass -File scripts/build-windows-msix.ps1 -Version $env:RELEASE_TAG -CertificatePath windows_signing_cert.pfx -CertificatePassword $env:WINDOWS_CERT_PASSWORD
                  } else {
                    Write-Host "No WINDOWS_CERT_PFX secret; skipping MSIX build.";
                  }
              shell: pwsh
            - name: Collect Windows artifacts
              run: |
                  New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
                  # Keep only the zipped bundle (includes exe + required DLLs) to avoid users running a bare exe without dependencies
                  Move-Item -Path windows-${{ env.RELEASE_TAG }}.zip -Destination dist/windows/
                  if (Test-Path *.msix) { Move-Item -Path *.msix -Destination dist/windows/ }
              shell: pwsh
            - name: Upload Windows artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: windows
                  path: dist/windows/*

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [android, web, windows]
        steps:
            - name: Download android artifact
              uses: actions/download-artifact@v4
              with:
                  name: android
                  path: artifacts/android
            - name: Download windows artifact
              uses: actions/download-artifact@v4
              with:
                  name: windows
                  path: artifacts/windows
            - name: Download web artifact
              uses: actions/download-artifact@v4
              with:
                  name: web
                  path: artifacts/web
            - name: Display downloaded files
              run: |
                  echo 'Listing artifacts:'
                  find artifacts -type f -maxdepth 4 -print
                  echo '----'
                  ls -R artifacts || true
            - name: Fail if no artifacts found
              run: |
                  count=$(find artifacts -type f | wc -l)
                  echo "Found $count files"
                  # Expect at least one file from each platform (3 total)
                  if [ "$count" -lt 3 ]; then echo "Expected build artifacts from android/web/windows"; exit 1; fi
            - name: Consolidate expected files
              run: |
                  mkdir -p release-files
                  cp artifacts/android/*.aab release-files/ 2>/dev/null || true
                  cp artifacts/android/*.apk release-files/ 2>/dev/null || true
                  cp artifacts/windows/*.zip release-files/ 2>/dev/null || true
                  cp artifacts/windows/*.exe release-files/ 2>/dev/null || true
                  cp artifacts/windows/*.msix release-files/ 2>/dev/null || true
                  cp artifacts/web/*.zip release-files/ 2>/dev/null || true
                  echo 'Final release-files contents:'
                  ls -l release-files
                  if ! ls release-files/* 1>/dev/null 2>&1; then echo 'No release files gathered'; exit 1; fi
                  # Ensure at least one Android artifact
                  if ! ls release-files/*.aab 1>/dev/null 2>&1 && ! ls release-files/*.apk 1>/dev/null 2>&1; then echo 'Missing Android APK/AAB'; exit 1; fi
                  # Ensure Windows zip present
                  if ! ls release-files/windows-*.zip 1>/dev/null 2>&1; then echo 'Missing Windows zip'; exit 1; fi
                  # Ensure web zip present
                  if ! ls release-files/web-*.zip 1>/dev/null 2>&1; then echo 'Missing Web zip'; exit 1; fi
            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  name: Release ${{ env.RELEASE_TAG }}
                  draft: false
                  prerelease: false
                  fail_on_unmatched_files: true
                  files: |
                      release-files/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
