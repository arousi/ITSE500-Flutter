name: Release Multi-Platform Builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  FLUTTER_CHANNEL: stable
  FLUTTER_VERSION_PIN: 3.24.3
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  android:
    name: Android (AAB + APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Optional Android signing setup
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_ALIAS_PASSWORD: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Setting up Android signing keystore";
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            cat > android/key.properties <<EOF
            storePassword=$KEYSTORE_PASSWORD
            keyPassword=$KEY_ALIAS_PASSWORD
            keyAlias=$KEY_ALIAS
            storeFile=release.keystore
            EOF
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret found; building unsigned artifacts.";
          fi
      - name: Build Android AppBundle
        run: flutter build appbundle --release
      - name: Build Android APK (universal)
        run: flutter build apk --release --target-platform=android-arm,android-arm64,android-x64
      - name: Collect Android artifacts
        run: |
          mkdir -p dist/android
          cp build/app/outputs/bundle/release/*.aab dist/android/
          cp build/app/outputs/flutter-apk/app-release.apk dist/android/app-universal-${{ env.RELEASE_TAG }}.apk || true
        shell: bash
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/android/*

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Web
        run: flutter build web --release
      - name: Package Web build (zip)
        run: |
          cd build/web
          zip -r ../../web-${{ env.RELEASE_TAG }}.zip .
      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: web-${{ env.RELEASE_TAG }}.zip

  linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Build Linux
        run: flutter build linux --release
      - name: Package Linux bundle (tar.gz)
        run: |
          tar -czf linux-x64-${{ env.RELEASE_TAG }}.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: linux-x64-${{ env.RELEASE_TAG }}.tar.gz

  windows:
    name: Windows (MSIX + Zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
          cache: true
      - name: Flutter pub get
        run: flutter pub get
        shell: pwsh
      - name: Build Windows
        run: flutter build windows --release
        shell: pwsh
      - name: Package Windows zip
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-${{ env.RELEASE_TAG }}.zip
        shell: pwsh
      - name: (Optional) Build MSIX via script if cert present
        env:
          WINDOWS_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if ($env:WINDOWS_CERT_PFX) {
            Write-Host "Building MSIX (certificate provided)";
            $pfxBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX)
            [IO.File]::WriteAllBytes('windows_signing_cert.pfx', $pfxBytes)
            powershell -ExecutionPolicy Bypass -File scripts/build-windows-msix.ps1 -Version $env:RELEASE_TAG -CertificatePath windows_signing_cert.pfx -CertificatePassword $env:WINDOWS_CERT_PASSWORD
          } else {
            Write-Host "No WINDOWS_CERT_PFX secret; skipping MSIX build.";
          }
        shell: pwsh
      - name: Collect Windows artifacts
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows | Out-Null
          Move-Item windows-${{ env.RELEASE_TAG }}.zip dist/windows/
          if (Test-Path *.msix) { Move-Item *.msix dist/windows/ }
        shell: pwsh
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/windows/*

  macos:
    name: macOS (.app zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Build macOS
        run: flutter build macos --release
      - name: Package .app (zip)
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent *.app macos-${{ env.RELEASE_TAG }}.zip
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/macos/Build/Products/Release/macos-${{ env.RELEASE_TAG }}.zip

  ios:
    name: iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          flutter-version: ${{ env.FLUTTER_VERSION_PIN }}
          cache: true
      - name: Flutter pub get
        run: flutter pub get
      - name: Determine if signing secrets exist
        id: signing
        env:
          CERT_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          if [ -n "$CERT_P12" ] && [ -n "$PROFILE" ]; then
            echo "has_signing=true" >> $GITHUB_OUTPUT
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
            echo "iOS signing secrets missing; skipping IPA build.";
          fi
      - name: Import signing certificate
        if: steps.signing.outputs.has_signing == 'true'
        env:
          CERT_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_P12" | base64 -D > certificate.p12 || echo "$CERT_P12" | base64 -d > certificate.p12
          security create-keychain -p temp build.keychain
          security import certificate.p12 -k build.keychain -P "$CERT_PASSWORD" -A
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k temp build.keychain
      - name: Install provisioning profile
        if: steps.signing.outputs.has_signing == 'true'
        env:
          PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision || echo "$PROFILE" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      - name: Build IPA
        if: steps.signing.outputs.has_signing == 'true'
        run: flutter build ipa --release
      - name: Collect IPA
        if: steps.signing.outputs.has_signing == 'true'
        run: |
          mkdir -p dist/ios
          cp build/ios/ipa/*.ipa dist/ios/app-${{ env.RELEASE_TAG }}.ipa
      - name: Upload iOS artifact
        if: steps.signing.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/ios/*.ipa

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android, web, linux, windows, macos]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Display downloaded files
        run: find artifacts -maxdepth 4 -type f -print
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          files: |
            artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_with_ios:
    name: Attach iOS Artifact (if available)
    runs-on: ubuntu-latest
    needs: [release, ios]
    steps:
      - name: Attempt download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios
          path: ios-artifacts
        continue-on-error: true
      - name: Update Release with iOS IPA (if present)
        run: |
          if ls ios-artifacts/*.ipa 1> /dev/null 2>&1; then
            echo "Uploading IPA to existing release";
          else
            echo "No IPA found; skipping."; exit 0; fi
        shell: bash
      - name: Upload IPA
        if: ${{ hashFiles('ios-artifacts/*.ipa') != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            ios-artifacts/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
