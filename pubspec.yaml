dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^4.0.0
  msix: ^3.16.7

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/imgs/inPrivate-Avatar.png
    - .env
    - assets/pricing/manual_pricing.md
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font.
  fonts:
    - family: Alexandria
      fonts:
        - asset: fonts/Alexandria-Thin.ttf
          weight: 100
        - asset: fonts/Alexandria-ExtraLight.ttf
          weight: 200
        - asset: fonts/Alexandria-Light.ttf
          weight: 300
        - asset: fonts/Alexandria-Regular.ttf
          weight: 400
        - asset: fonts/Alexandria-Medium.ttf
          weight: 500
        - asset: fonts/Alexandria-SemiBold.ttf
          weight: 600
        - asset: fonts/Alexandria-Bold.ttf
          weight: 700
        - asset: fonts/Alexandria-ExtraBold.ttf
          weight: 800
        - asset: fonts/Alexandria-Black.ttf
          weight: 900
    - family: NotoKufiArabic
      fonts:
        - asset: fonts/NotoKufiArabic-Thin.ttf
          weight: 100
        - asset: fonts/NotoKufiArabic-ExtraLight.ttf
          weight: 200
        - asset: fonts/NotoKufiArabic-Light.ttf
          weight: 300
        - asset: fonts/NotoKufiArabic-Regular.ttf
          weight: 400
        - asset: fonts/NotoKufiArabic-Medium.ttf
          weight: 500
        - asset: fonts/NotoKufiArabic-SemiBold.ttf
          weight: 600
        - asset: fonts/NotoKufiArabic-Bold.ttf
          weight: 700
        - asset: fonts/NotoKufiArabic-ExtraBold.ttf
          weight: 800
        - asset: fonts/NotoKufiArabic-Black.ttf
          weight: 900
    - family: NotoNaskhArabic
      fonts:
        - asset: fonts/NotoNaskhArabic-Regular.ttf
          weight: 400
        - asset: fonts/NotoNaskhArabic-Medium.ttf
          weight: 500
        - asset: fonts/NotoNaskhArabic-SemiBold.ttf
          weight: 600
        - asset: fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
    - family: ReadexPro
      fonts:
        - asset: fonts/ReadexPro-ExtraLight.ttf
          weight: 200
        - asset: fonts/ReadexPro-Light.ttf
          weight: 300
        - asset: fonts/ReadexPro-Regular.ttf
          weight: 400
        - asset: fonts/ReadexPro-Medium.ttf
          weight: 500
        - asset: fonts/ReadexPro-Bold.ttf
          weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# MSIX packaging configuration for Windows
msix_config:
  display_name: ITSE500
  publisher_display_name: ITSE500 Team
  identity_name: com.itse500.ok.app
  # Replace with your real publisher subject for signing
  publisher: CN=ITSE500 Dev (Local), O=ITSE500, C=LY
  msix_version: 1.0.0.0
  logo_path: assets\imgs\inPrivate-Avatar.png
  start_menu_icon_path: assets\imgs\inPrivate-Avatar.png
  tile_icon_path: assets\imgs\inPrivate-Avatar.png
  enable_at_startup: false
  architecture: x64
  capabilities: internetClient
  protocol_activation: myapp
  # For local testing without a real cert, let the tool generate a dev cert
  install_certificate: false
  certificate_path: windows\certs\itse500-dev.pfx
  certificate_password: itse500-dev

