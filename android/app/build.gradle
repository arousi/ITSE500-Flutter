plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // Single authoritative namespace for the application
    namespace = "com.example.flutter_app_itse500"
    // Updated to API 36 for alignment with production target
    compileSdk = 36 // also exposed through ext.flutter.compileSdkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.flutter_app_itse500"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // Use explicit values so legacy plugins depending on ext.flutter still succeed
        minSdk = rootProject.ext.flutter.minSdkVersion
        targetSdk = rootProject.ext.flutter.targetSdkVersion
    // Flutter Gradle plugin still injects these, but if unavailable you can hardcode.
    versionCode = flutter.versionCode
    versionName = flutter.versionName
        // Required for OAuth / AppAuth based redirect intent-filters referencing ${appAuthRedirectScheme}
        // Make sure this matches the scheme part of your redirect URI (e.g., com.example.flutter_app_itse500:/oauthredirect)
        manifestPlaceholders = [
            // Used by OAuth intent-filter schemes
            appAuthRedirectScheme: "com.example.flutter_app_itse500",
            // Needed because we manually define manifestPlaceholders; Flutter plugin normally supplies this
            applicationName: "io.flutter.app.FlutterApplication"
        ]
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
